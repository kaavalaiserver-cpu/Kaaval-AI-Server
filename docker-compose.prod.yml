version: '3.8'

services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/yourusername/kaaval-frontend:latest}
    container_name: kaaval-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/yourusername/kaaval-backend:latest}
    container_name: kaaval-backend
    expose:
      - "8003"
    ports:
      - "8003:8003"
    env_file: .env
    volumes:
      - F:/kaaval ai database/uploads:/app/data/uploads
      - F:/kaaval ai database/logs:/usr/src/app/logs
      - F:/kaaval ai database/backups:/app/data/backups
      - F:/kaaval ai database/exports:/app/data/exports
      - F:/kaaval ai database:/host_f_drive:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/api/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: kaaval-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - F:/kaaval ai database/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kaaval_ai"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  evidence_api:
    image: ${EVIDENCE_IMAGE:-ghcr.io/yourusername/kaaval-evidence-api:latest}
    container_name: kaaval-evidence-api
    expose:
      - "8001"
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - F:/kaaval ai database/ai_models:/app/ai_models
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped
