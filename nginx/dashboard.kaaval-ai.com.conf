server {
    listen 80 default_server;
    server_name dashboard.kaaval-ai.com;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets (React)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Route Analytics, Evidence, and Search to FastAPI (Port 8001)
    location /api/analytics/ {
        proxy_pass http://127.0.0.1:8001/api/analytics/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/evidence/ {
        proxy_pass http://127.0.0.1:8001/api/evidence/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/search {
        proxy_pass http://127.0.0.1:8001/api/search;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route all other /api requests to NestJS Backend (Port 8003)
    location /api/ {
        proxy_pass http://127.0.0.1:8003/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Optional: SSL Config (Uncomment when you have certs)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/dashboard.kaaval-ai.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dashboard.kaaval-ai.com/privkey.pem;
}
