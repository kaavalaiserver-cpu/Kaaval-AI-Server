server {
    listen 80;
    server_name kaaval-ai.com www.kaaval-ai.com;

    # Marketing Website Root (to be built later)
    root /var/www/kaaval-website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redirect well-known legacy URLs to dashboard domain if needed
    location /login {
        return 301 http://dashboard.kaaval-ai.com/login;
    }

    # Optional: SSL Config (Uncomment when you have certs)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/kaaval-ai.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/kaaval-ai.com/privkey.pem;
}
