server {
    listen 80;
    server_name api.kaaval-ai.com;

    # CORS Headers for API Gateway
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-api-key' always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Route Analytics, Evidence, Search to FastAPI (Port 8001)
    location /analytics/ {
        proxy_pass http://127.0.0.1:8001/api/analytics/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /evidence/ {
        proxy_pass http://127.0.0.1:8001/api/evidence/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /search {
        proxy_pass http://127.0.0.1:8001/api/search;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ingest {
        proxy_pass http://127.0.0.1:8001/api/ingest;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Increase max body size for image uploads from cameras
        client_max_body_size 50M;
    }

    # Route all other requests to NestJS Backend (Port 8003)
    location / {
        proxy_pass http://127.0.0.1:8003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Optional: SSL Config
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/api.kaaval-ai.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.kaaval-ai.com/privkey.pem;
}
