name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'admin dashboard/kaaval-backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ec2-user/kaaval-ai
            
            git fetch --all
            git reset --hard origin/main
            
            cd "admin dashboard/kaaval-backend"
            npm ci
            npm run build
            
            pm2 reload kaaval-backend
            pm2 save
