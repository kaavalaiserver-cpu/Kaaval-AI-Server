name: Build and Publish Docker Images

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Frontend ---
      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-frontend

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./admin dashboard/kaaval_dashboard
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      # --- Backend ---
      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./admin dashboard/kaaval-backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      # --- Evidence API ---
      - name: Extract metadata (tags, labels) for Evidence API
        id: meta-evidence
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-evidence-api

      - name: Build and push Evidence API
        uses: docker/build-push-action@v5
        with:
          context: ./kaaval_api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-evidence.outputs.tags }}
          labels: ${{ steps.meta-evidence.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout deploy scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            scripts
            docker-compose.prod.yml
      
      - name: Run Deployment Script with Auto-Rollback
        shell: powershell
        run: |
          $CommitSha = "${{ github.sha }}"
          $ShortSha = $CommitSha.Substring(0, 7)
          $Tag = "sha-$ShortSha"
          
          $Registry = "${{ env.REGISTRY }}"
          $RepoLower = "${{ github.repository }}".ToLower()
          
          $FrontendImage = "$RepoLower-frontend"
          $BackendImage = "$RepoLower-backend"
          $EvidenceImage = "$RepoLower-evidence-api"
          
          .\scripts\deploy.ps1 -Tag $Tag -Registry $Registry -FrontendImage $FrontendImage -BackendImage $BackendImage -EvidenceImage $EvidenceImage
