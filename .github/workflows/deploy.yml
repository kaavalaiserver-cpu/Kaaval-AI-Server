name: Build and Deploy Kaaval AI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  EVIDENCE_IMAGE_NAME: ${{ github.repository }}-evidence-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ env.EVIDENCE_IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: "./admin dashboard/kaaval_dashboard"
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: "./admin dashboard/kaaval-backend"
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Evidence API
        uses: docker/build-push-action@v5
        with:
          context: ./kaaval_api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.EVIDENCE_IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    
    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts
            docker-compose.yml
      
      - name: Run Deployment Script with Auto-Rollback
        shell: powershell
        run: |
          $Tag = "${{ needs.build-and-push.outputs.image_tag }}"
          $Registry = "${{ env.REGISTRY }}"
          $FrontendImage = "${{ env.FRONTEND_IMAGE_NAME }}"
          $BackendImage = "${{ env.BACKEND_IMAGE_NAME }}"
          $EvidenceImage = "${{ env.EVIDENCE_IMAGE_NAME }}"
          
          # Pass these to our local deploy script
          .\scripts\deploy.ps1 -Tag $Tag -Registry $Registry -FrontendImage $FrontendImage -BackendImage $BackendImage -EvidenceImage $EvidenceImage
